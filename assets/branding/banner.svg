<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
  <defs>
    <linearGradient id="banner-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A" />
      <stop offset="100%" style="stop-color:#1E293B" />
    </linearGradient>
  </defs>
  <rect width="1544" height="500" fill="url(#banner-grad)" />

  <!-- Decorative radar background -->
  <g opacity="0.1">
    <circle cx="300" cy="250" r="150" fill="none" stroke="#0EA5E9" stroke-width="2" />
    <circle cx="300" cy="250" r="100" fill="none" stroke="#0EA5E9" stroke-width="1" />
    <circle cx="300" cy="250" r="50" fill="none" stroke="#0EA5E9" stroke-width="1" />
  </g>

  <!-- Shield icon -->
  <g transform="translate(200,150)">
    <path d="M100 10 L180 55 L180 130 Q180 200 100 230 Q20 200 20 130 L20 55 Z" fill="none" stroke="#0EA5E9"
      stroke-width="4" />
    <circle cx="100" cy="120" r="45" fill="none" stroke="#22C55E" stroke-width="2" opacity="0.8" />
    <circle cx="100" cy="120" r="8" fill="#22C55E" />
  </g>

  <!-- Text -->
  <text x="450" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700"
    fill="#F8FAFC">
    Website Security Radar
  </text>
  <text x="450" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94A3B8">
    Lightweight malware scanner, file monitor &amp; hardening checker for WordPress
  </text>

  <!-- Badges -->
  <g transform="translate(450,320)">
    <rect x="0" y="0" rx="8" width="140" height="40" fill="#22C55E" opacity="0.2" />
    <text x="70" y="25" font-family="system-ui" font-size="14" font-weight="600" fill="#22C55E" text-anchor="middle">✓
      WordPress.org Ready</text>

    <rect x="160" y="0" rx="8" width="130" height="40" fill="#0EA5E9" opacity="0.2" />
    <text x="225" y="25" font-family="system-ui" font-size="14" font-weight="600" fill="#0EA5E9" text-anchor="middle">✓
      No Tracking</text>

    <rect x="310" y="0" rx="8" width="150" height="40" fill="#F59E0B" opacity="0.2" />
    <text x="385" y="25" font-family="system-ui" font-size="14" font-weight="600" fill="#F59E0B" text-anchor="middle">✓
      Client-Friendly UI</text>
  </g>
</svg>