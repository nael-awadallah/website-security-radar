<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
      <defs>
            <linearGradient id="wsr-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#0EA5E9" />
                  <stop offset="100%" style="stop-color:#0F172A" />
            </linearGradient>
      </defs>
      <!-- Shield outline -->
      <path d="M50 5 L85 25 L85 55 Q85 85 50 95 Q15 85 15 55 L15 25 Z" fill="none" stroke="url(#wsr-grad)"
            stroke-width="4" stroke-linejoin="round" />
      <!-- Radar circles -->
      <circle cx="50" cy="50" r="25" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.6">
            <animate attributeName="r" values="15;25;15" dur="3s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle cx="50" cy="50" r="18" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.4" />
      <!-- Signal pulse -->
      <circle cx="50" cy="50" r="3" fill="#22C55E">
            <animate attributeName="r" values="2;5;2" dur="2s" repeatCount="indefinite" />
      </circle>
      <!-- Scan line -->
      <line x1="50" y1="50" x2="70" y2="30" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="4s"
                  repeatCount="indefinite" />
      </line>
</svg>